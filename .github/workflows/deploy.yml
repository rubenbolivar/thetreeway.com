name: Deploy to VPS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18" # parity with the VPS runtime (pm2/node 18)
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Next standalone)
        run: NODE_ENV=production npm run build
        env:
          CI: true
          # NEXT_PUBLIC_* are inlined at build time (canonical, sitemap).
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${{ secrets.NEXT_PUBLIC_PLAUSIBLE_DOMAIN }}

      - name: Assemble standalone runtime
        # output:'standalone' does NOT bundle static/public — they must
        # sit next to server.js or /_next/static 400s (Sprint 6 finding).
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          tar -czf thetreeway-${{ github.sha }}.tar.gz -C .next/standalone .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: thetreeway-${{ github.sha }}
          path: thetreeway-${{ github.sha }}.tar.gz
          retention-days: 30

      - name: Copy bundle to VPS
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "thetreeway-${{ github.sha }}.tar.gz"
          target: "/tmp/"

      - name: Atomic deploy + PM2 reload
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: SHA,CAL_COM_USERNAME,CAL_COM_EVENT,NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_PLAUSIBLE_DOMAIN
          script: |
            set -e
            SHA="${{ github.sha }}"
            TARBALL="/tmp/thetreeway-${SHA}.tar.gz"
            APP="/opt/thetreeway"
            NEW="/opt/thetreeway.new"
            OLD="/opt/thetreeway.old"
            PORT=3003

            rm -rf "$NEW" "$OLD"
            mkdir -p "$NEW"
            tar -xzf "$TARBALL" -C "$NEW"

            # Runtime env (NOT committed; written from Actions secrets).
            # NOTE: Next's standalone server.js does NOT read this .env at
            # runtime — it only sees process.env. We load it explicitly
            # below before pm2 so the PM2 child inherits these vars.
            # HOSTNAME=:: (dual-stack): the standalone server runs
            # middleware then self-proxies to localhost:$PORT; on this
            # box localhost→::1 (IPv6), so binding only 127.0.0.1 makes
            # every SSR/i18n route 500/hang (rehearsal finding). Binding
            # :: accepts ::1 and 127.0.0.1, so nginx → 127.0.0.1:$PORT
            # still works. NODE_OPTIONS ipv4first is belt-and-braces.
            cat > "$NEW/.env" <<ENVEOF
            NODE_ENV=production
            PORT=$PORT
            HOSTNAME=::
            NODE_OPTIONS=--dns-result-order=ipv4first
            CAL_COM_USERNAME=${{ secrets.CAL_COM_USERNAME }}
            CAL_COM_EVENT=${{ secrets.CAL_COM_EVENT }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_PLAUSIBLE_DOMAIN=${{ secrets.NEXT_PUBLIC_PLAUSIBLE_DOMAIN }}
            ENVEOF
            chmod 600 "$NEW/.env"

            # Atomic swap
            [ -d "$APP" ] && mv "$APP" "$OLD"
            mv "$NEW" "$APP"

            # Load .env into THIS shell so the PM2 child (and
            # `pm2 reload --update-env`) inherit it. We can't `source`
            # it: some values may contain shell metachars (spaces, <>,
            # etc.). Split on the first '=', export literally.
            set -a
            while IFS='=' read -r k v; do
              case "$k" in ''|\#*) continue;; esac
              export "$k=$v"
            done < "$APP/.env"
            set +a

            # PM2: start or reload the standalone server (node server.js)
            cd "$APP"
            if pm2 describe thetreeway > /dev/null 2>&1; then
              pm2 reload thetreeway --update-env
            else
              pm2 start server.js --name thetreeway --cwd "$APP"
            fi
            pm2 save

            # Smoke test the Node app directly on its port
            sleep 4
            if curl -sf -o /dev/null --max-time 10 "http://127.0.0.1:$PORT/es" \
               && curl -sf -o /dev/null --max-time 10 "http://127.0.0.1:$PORT/rubenbolivar"; then
              echo "Smoke OK — keeping $SHA"
              rm -rf "$OLD"; rm -f "$TARBALL"
            else
              echo "Smoke FAILED — rolling back"
              pm2 stop thetreeway || true
              rm -rf "$APP"
              [ -d "$OLD" ] && mv "$OLD" "$APP"
              cd "$APP" 2>/dev/null && pm2 reload thetreeway --update-env || true
              rm -f "$TARBALL"
              exit 1
            fi

      - name: Lighthouse CI
        if: github.event_name == 'pull_request'
        uses: treosh/lighthouse-ci-action@v10
        with:
          temporaryPublicStorage: true
