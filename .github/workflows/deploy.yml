name: Deploy to VPS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: |
        NODE_ENV=production npm run build
      env:
        CI: true

    - name: Run tests (if available)
      run: |
        if [ -f "package.json" ] && grep -q "\"test\":" package.json; then
          npm test -- --passWithNoTests
        else
          echo "No tests found, skipping..."
        fi

    - name: Create deployment package
      run: |
        tar -czf thetreeway-website-${{ github.sha }}.tar.gz -C out .

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: website-build-${{ github.sha }}
        path: thetreeway-website-${{ github.sha }}.tar.gz
        retention-days: 30

    - name: Copy tarball to VPS via SCP
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        source: "thetreeway-website-${{ github.sha }}.tar.gz"
        target: "/tmp/"

    - name: Atomic deploy on VPS
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          set -e
          SHA="${{ github.sha }}"
          TARBALL="/tmp/thetreeway-website-${SHA}.tar.gz"
          WEB="/var/www/thetreeway.com"
          NEW="/var/www/thetreeway.com.new"
          OLD="/var/www/thetreeway.com.old"

          # Cleanup leftovers from previous failed attempts
          rm -rf "$NEW" "$OLD"

          # Extract to new dir
          mkdir -p "$NEW"
          tar -xzf "$TARBALL" -C "$NEW"
          chown -R www-data:www-data "$NEW"

          # Atomic swap
          mv "$WEB" "$OLD"
          mv "$NEW" "$WEB"

          # Smoke test against the live HTTPS endpoint via localhost
          if curl -k -sf -o /dev/null --max-time 10 \
               --resolve thetreeway.com:443:127.0.0.1 \
               https://thetreeway.com/ \
             && curl -k -sf -o /dev/null --max-time 10 \
                  --resolve thetreeway.com:443:127.0.0.1 \
                  https://thetreeway.com/rubenbolivar/; then
            echo "Smoke test OK — keeping new deploy"
            rm -rf "$OLD"
            rm -f "$TARBALL"
          else
            echo "Smoke test FAILED — rolling back"
            rm -rf "$WEB"
            mv "$OLD" "$WEB"
            rm -f "$TARBALL"
            exit 1
          fi

          echo "Deploy of $SHA completed successfully"

    - name: Lighthouse CI
      if: github.event_name == 'pull_request'
      uses: treosh/lighthouse-ci-action@v10
      with:
        temporaryPublicStorage: true